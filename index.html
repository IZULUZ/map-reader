<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Map Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg: #2d004b; --grid-road: #dcdcdc; --grid-grass: #c1f0c1;
            --btn-forward: #00f0ff; --btn-backward: #ffb3d9; --btn-right: #ffeb3b; --btn-left: #ff8c00;
        }
        body { margin: 0; font-family: 'Nunito', sans-serif; background-color: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; user-select: none; }
        h1 { font-family: 'Fredoka One', cursive; font-size: 2.5rem; color: #ff007f; text-shadow: 2px 2px white, 4px 4px #00f0ff; margin: 5px 0; }
        
        .screen { display: none; width: 100%; max-width: 1000px; height: 100%; flex-direction: column; align-items: center; padding: 15px; box-sizing: border-box; }
        .active { display: flex; }

        button { font-family: 'Fredoka One', cursive; font-size: 1.2rem; padding: 12px 20px; border: 4px solid black; border-radius: 15px; cursor: pointer; box-shadow: 4px 4px black; transition: transform 0.1s; }
        button:active { transform: translate(4px, 4px); box-shadow: none; }
        .btn-pink { background-color: #ff007f; color: white; }
        .btn-cyan { background-color: #00f0ff; color: black; }
        .btn-yellow { background-color: #ffeb3b; color: black; }

        input { font-family: 'Nunito', sans-serif; font-size: 1.5rem; padding: 10px; border: 4px solid black; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        
        .char-selection-container { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;}
        .char-option { width: 70px; height: 70px; border: 4px solid white; border-radius: 15px; background-color: rgba(255,255,255,0.2); cursor: pointer; overflow: hidden; display: flex; justify-content: center; align-items: center; position: relative; }
        .char-option.selected { border-color: #39ff14; background-color: rgba(57,255,20,0.3); box-shadow: 0 0 15px #39ff14; }
        .char-option img { width: 100%; height: 100%; object-fit: contain; }
        
        .team-container { display: flex; gap: 20px; width: 100%; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
        .team-box { width: 280px; min-height: 150px; border: 4px dashed white; border-radius: 20px; padding: 10px; background: rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .team-title { font-family: 'Fredoka One'; font-size: 1.5rem; text-align: center; margin-bottom: 5px; }
        .player-card { background: white; color: black; border: 3px solid black; border-radius: 10px; padding: 5px 10px; width: 85%; cursor: grab; display: flex; align-items: center; gap: 10px; font-weight: 900; }
        .player-card img { width: 35px; height: 35px; object-fit: contain; background: #eee; border-radius: 5px; }

        .game-header { display: flex; justify-content: space-between; width: 100%; max-width: 500px; background: white; color: black; border: 4px solid black; border-radius: 10px; padding: 10px 20px; margin-bottom: 10px; font-family: 'Fredoka One'; font-size: 1.2rem; box-sizing: border-box;}
        .timer { color: #ff007f; font-size: 1.5rem; }

        .board-section { display: flex; flex-direction: column; align-items: center; background: #fff9e6; border: 4px solid black; border-radius: 20px; padding: 15px; width: 100%; max-width: 500px; box-sizing: border-box;}
        .grid-board { display: grid; grid-template-columns: repeat(5, 60px); grid-template-rows: repeat(5, 60px); gap: 2px; background: black; border: 4px solid black; position: relative; }
        .cell { width: 60px; height: 60px; background-color: var(--grid-grass); display: flex; justify-content: center; align-items: center; font-size: 2rem; position: relative; }
        
        /* 맵 요소 절대경로(./) 추가로 인식률 높임 */
        .road { background-color: var(--grid-road); background-image: url('./road.png'); background-size: cover; }
        .obstacle-cell { background-image: url('./obstacle.png'); background-size: cover; }
        .building-cell { position: relative; background-size: cover; }
        
        .char-wrapper { position: absolute; width: 60px; height: 60px; z-index: 10; transition: transform 0.3s ease-in-out; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        .char-sprite { width: 45px; height: 45px; object-fit: contain; transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1); }
        .char-name-tag { position: absolute; bottom: -10px; background: rgba(0,0,0,0.8); color: white; padding: 2px 4px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; white-space: nowrap; }
        
        .path-dot { width: 12px; height: 12px; background-color: yellow; border: 2px solid black; border-radius: 50%; position: absolute; z-index: 5; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; width: 100%; }
        #dest-display { font-family: 'Fredoka One'; font-size: 1.5rem; color: #ff007f; margin-bottom: 10px; background: white; padding: 5px 15px; border-radius: 10px; border: 3px solid black; text-align: center; width: 100%; box-sizing: border-box;}
        #role-display { color: yellow; margin: 5px 0; text-align: center; }

        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center;}
        .modal-box { background: white; color: black; border: 5px solid #ff007f; border-radius: 20px; padding: 30px; width: 80%; max-width: 400px; font-family: 'Fredoka One'; }
    </style>
</head>
<body>

    <h1>Map Reader</h1>

    <div id="intro-screen" class="screen active">
        <h2 style="color:var(--btn-forward)">Enter Your Nickname</h2>
        <input type="text" id="nickname-input" placeholder="Your Name" maxlength="10">
        
        <h3 style="color:var(--btn-right)">Select Your Character</h3>
        <div class="char-selection-container">
            <div class="char-option selected" onclick="selectChar('./char1.png', this)"><img src="./char1.png" alt="char1"></div>
            <div class="char-option" onclick="selectChar('./char2.png', this)"><img src="./char2.png" alt="char2"></div>
            <div class="char-option" onclick="selectChar('./char3.png', this)"><img src="./char3.png" alt="char3"></div>
            <div class="char-option" onclick="selectChar('./char4.png', this)"><img src="./char4.png" alt="char4"></div>
            <div class="char-option" onclick="selectChar('./char5.png', this)"><img src="./char5.png" alt="char5"></div>
        </div>

        <button class="btn-pink" onclick="login()">ENTER GAME</button>
    </div>

    <div id="lobby-screen" class="screen">
        <h2>Welcome, <span id="display-name" style="color: yellow;"></span>!</h2>
        <div style="display: flex; gap: 20px; margin-top: 30px; align-items: center;">
            <button class="btn-cyan" onclick="createRoom()">CREATE ROOM</button>
            <h3 style="margin: 0 20px;">OR</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="room-code-input" placeholder="Enter 4 Digits" maxlength="4">
                <button class="btn-yellow" onclick="joinRoom()">JOIN ROOM</button>
            </div>
        </div>
    </div>

    <div id="room-screen" class="screen">
        <h2>Room Code: <span id="room-code-display" style="color:#39ff14; font-size: 3rem;"></span></h2>
        <p>Drag your character card to pick a team!</p>
        <div class="team-container">
            <div class="team-box" id="team-A" ondragover="allowDrop(event)" ondrop="drop(event, 'A')"><div class="team-title" style="color: #ff007f;">TEAM A</div></div>
            <div class="team-box" id="team-B" ondragover="allowDrop(event)" ondrop="drop(event, 'B')"><div class="team-title" style="color: #00f0ff;">TEAM B</div></div>
            <div class="team-box" id="team-none" ondragover="allowDrop(event)" ondrop="drop(event, 'none')"><div class="team-title" style="color: white;">Waiting Area</div></div>
        </div>
        <div style="margin-top: 20px; display: flex; gap: 20px;">
            <button class="btn-cyan" id="ready-btn" onclick="toggleReady()">READY</button>
            <button class="btn-pink" id="start-game-btn" onclick="startGame()" style="display: none;">START GAME</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-header">
            <span id="round-info">Round 1/4</span>
            <span class="timer" id="timer-display">00:00</span>
        </div>
        <h3 id="role-display"></h3>
        
        <div class="board-section" id="my-board-section">
            <div id="dest-display">Wait...</div>
            
            <div class="grid-board" id="grid">
                <div class="char-wrapper" id="player-wrapper" style="display:none;">
                    <img id="player-sprite" class="char-sprite" src="./char1.png" alt="player">
                    <div class="char-name-tag" id="player-name-tag">Player</div>
                </div>
            </div>

            <div class="controls" id="controls" style="display: none;">
                <button style="background: var(--btn-forward)" onclick="moveChar('forward')">⬆️ Forward</button>
                <button style="background: var(--btn-backward)" onclick="moveChar('backward')">⬇️ Backward</button>
                <button style="background: var(--btn-left)" onclick="moveChar('left')">↩️ Turn Left</button>
                <button style="background: var(--btn-right)" onclick="moveChar('right')">↪️ Turn Right</button>
            </div>
            <button class="btn-pink" id="check-btn" onclick="checkWin()" style="width: 100%; margin-top: 15px; display: none;">CHECK DESTINATION</button>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-box">
            <h2 id="modal-title" style="color: #ff007f;">Round Cleared!</h2>
            <p id="modal-desc" style="font-size: 1.2rem;"></p>
            <button class="btn-cyan" id="next-round-btn" onclick="readyNextRound()" style="display: none; margin-top: 15px; width: 100%;">Next Round Ready</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB3_wuWX1_d3SQJyISYENg_Slo0xU4MDI4",
            authDomain: "mapreader-a1faa.firebaseapp.com",
            databaseURL: "https://mapreader-a1faa-default-rtdb.firebaseio.com", 
            projectId: "mapreader-a1faa",
            storageBucket: "mapreader-a1faa.firebasestorage.app",
            messagingSenderId: "1056558168005",
            appId: "1:1056558168005:web:016434cbb166c5b338bdac",
            measurementId: "G-9463ZL4HXH"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myId = "user_" + Math.floor(Math.random() * 10000);
        let myName = "";
        let myChar = "./char1.png";
        let currentRoom = "";
        let isHost = false;
        let myTeam = "none";
        let myRole = "";
        let timerInterval = null;
        let roundStartTime = 0;
        let currentRound = 1;

        const mapData = [
            [2, 0, 0, 3, 4],
            [1, 3, 0, 1, 0],
            [5, 0, 0, 0, 0],
            [1, 0, 1, 3, 0],
            [0, 0, 0, 6, 1]
        ];
        
        const targets = [
            { id: 2, name: "HOSPITAL", x: 0, y: 0 },
            { id: 4, name: "SCHOOL", x: 4, y: 0 },
            { id: 5, name: "BANK", x: 0, y: 2 },
            { id: 6, name: "PARK", x: 3, y: 4 }
        ];

        function selectChar(imgName, element) {
            myChar = imgName;
            document.querySelectorAll('.char-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
        }

        function login() {
            const nameInput = document.getElementById('nickname-input').value.trim();
            if(!nameInput) return alert("Please enter a nickname!");
            myName = nameInput;
            document.getElementById('display-name').innerText = myName;
            switchScreen('lobby-screen');
        }

        function createRoom() {
            currentRoom = Math.floor(1000 + Math.random() * 9000).toString();
            isHost = true;
            db.ref('rooms/' + currentRoom).set({ status: 'waiting', round: 1 }).then(() => {
                joinDbRoom();
                switchScreen('room-screen');
                document.getElementById('room-code-display').innerText = currentRoom;
                document.getElementById('start-game-btn').style.display = 'block';
            });
        }

        function joinRoom() {
            const code = document.getElementById('room-code-input').value.trim();
            if(code.length !== 4) return alert("Enter 4 digits!");
            currentRoom = code;
            joinDbRoom();
            switchScreen('room-screen');
            document.getElementById('room-code-display').innerText = currentRoom;
        }

        function joinDbRoom() {
            const playerRef = db.ref(`rooms/${currentRoom}/players/${myId}`);
            playerRef.set({ name: myName, charImg: myChar, team: 'none', ready: false });

            db.ref(`rooms/${currentRoom}`).on('value', (snapshot) => {
                const data = snapshot.val();
                if(!data) return;

                if(data.status === 'waiting') {
                    renderWaitingRoom(data.players);
                } else if(data.status === 'playing') {
                    document.getElementById('modal').style.display = 'none';
                    if(!document.getElementById('game-screen').classList.contains('active')){
                        switchScreen('game-screen');
                        startGameLogic(data);
                    }
                    updateGameScreen(data);
                } else if(data.status === 'round_end' || data.status === 'game_over') {
                    showRoundEnd(data);
                }
            });
        }

        function renderWaitingRoom(players) {
            ['A', 'B', 'none'].forEach(t => document.getElementById(`team-${t}`).innerHTML = `<div class="team-title" style="color: ${t==='A'?'#ff007f':t==='B'?'#00f0ff':'white'};">TEAM ${t==='none'?'Waiting Area':t}</div>`);
            for(let id in players) {
                const p = players[id];
                const div = document.createElement('div');
                div.className = 'player-card'; div.draggable = (id === myId); div.id = id; div.ondragstart = drag;
                div.innerHTML = `<img src="${p.charImg}" alt="char"><span>${p.name} ${p.ready ? '✅' : ''}</span>`;
                document.getElementById('team-' + p.team).appendChild(div);
            }
        }

        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function allowDrop(ev) { ev.preventDefault(); }
        function drop(ev, teamName) {
            ev.preventDefault(); myTeam = teamName;
            db.ref(`rooms/${currentRoom}/players/${myId}`).update({ team: teamName });
        }

        function toggleReady() {
            const ref = db.ref(`rooms/${currentRoom}/players/${myId}`);
            ref.once('value').then(s => ref.update({ ready: !s.val().ready }));
        }

        function startGame() {
            // 아무 팀에도 속하지 않은 유저가 있는지 체크 방지 (원하시면 추가 가능)
            startRound(1);
        }

        function startRound(roundNum) {
            const rData = { status: 'playing', round: roundNum, startTime: Date.now() };
            ['A', 'B'].forEach(t => {
                rData[`teams/${t}/charX`] = 4;
                rData[`teams/${t}/charY`] = 4;
                rData[`teams/${t}/charDir`] = 0;
                rData[`teams/${t}/path`] = "4,4";
                rData[`teams/${t}/finished`] = false;
            });
            db.ref(`rooms/${currentRoom}`).update(rData);
        }

        function startGameLogic(data) {
            currentRound = data.round;
            document.getElementById('round-info').innerText = `Round ${currentRound}/4`;
            
            roundStartTime = data.startTime;
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);

            // [수정된 핵심 로직] 내 팀의 플레이어들만 모아서 역할을 정확히 분리합니다.
            let myTeamPlayers = [];
            for(let id in data.players) { 
                if(data.players[id].team === myTeam) {
                    myTeamPlayers.push({id: id, ...data.players[id]}); 
                }
            }
            myTeamPlayers.sort((a,b) => a.id.localeCompare(b.id)); // 항상 동일한 순서 정렬
            
            let explorerData = null;

            if(myTeam === 'none' || myTeamPlayers.length === 0) {
                myRole = 'Spectator'; // 관전자
            } else if(myTeamPlayers.length > 1) {
                // 라운드가 홀수면 0번이 가이드, 1번이 탐험가. 짝수면 반대.
                if(currentRound % 2 !== 0) {
                    myRole = (myId === myTeamPlayers[0].id) ? 'Guide' : 'Explorer';
                    explorerData = myTeamPlayers[1]; // 탐험가 데이터
                } else {
                    myRole = (myId === myTeamPlayers[0].id) ? 'Explorer' : 'Guide';
                    explorerData = myTeamPlayers[0]; // 탐험가 데이터
                }
            } else {
                myRole = 'Explorer'; // 혼자일 경우 테스트용
                explorerData = myTeamPlayers[0];
            }

            document.getElementById('role-display').innerText = myRole === 'Guide' ? "You: GUIDE (Map Reader)" : "You: EXPLORER (Blind Walker)";

            const grid = document.getElementById('grid');
            document.querySelectorAll('.cell').forEach(e => e.remove());

            const targetObj = targets[currentRound - 1];

            if(myRole === 'Guide' || myRole === 'Spectator') {
                document.getElementById('dest-display').innerText = "Guide them to their destination!";
                document.getElementById('controls').style.display = 'none';
                document.getElementById('check-btn').style.display = 'none';

                for(let y=0; y<5; y++) {
                    for(let x=0; x<5; x++) {
                        let cell = document.createElement('div');
                        cell.className = 'cell'; cell.id = `cell-${x}-${y}`;
                        if(mapData[y][x] === 0) cell.classList.add('road');
                        if(mapData[y][x] === 3) { cell.innerText = '🪨'; cell.classList.add('obstacle-cell'); }
                        if(mapData[y][x] === 2) { cell.innerText = '🏥'; cell.classList.add('building-cell'); }
                        if(mapData[y][x] === 4) { cell.innerText = '🏫'; cell.classList.add('building-cell'); }
                        if(mapData[y][x] === 5) { cell.innerText = '🏦'; cell.classList.add('building-cell'); }
                        if(mapData[y][x] === 6) { cell.innerText = '🌲'; cell.classList.add('building-cell'); }
                        grid.appendChild(cell);
                    }
                }
            } else {
                document.getElementById('dest-display').innerText = `Target: ${targetObj.name} ${targetObj.emoji||''}`;
                document.getElementById('controls').style.display = 'grid';
                document.getElementById('check-btn').style.display = 'block';
                for(let i=0; i<25; i++) {
                    let cell = document.createElement('div');
                    cell.className = 'cell'; cell.style.background = 'white';
                    grid.appendChild(cell);
                }
            }

            // 캐릭터 이름 및 이미지 세팅 (내 팀의 탐험가 닉네임만 표시)
            const wrapper = document.getElementById('player-wrapper');
            if (explorerData) {
                wrapper.style.display = 'flex';
                document.getElementById('player-sprite').src = explorerData.charImg;
                document.getElementById('player-name-tag').innerText = explorerData.name;
            } else {
                wrapper.style.display = 'none';
            }
        }

        function updateGameScreen(data) {
            if(myTeam === 'none' || !data.teams || !data.teams[myTeam]) return;
            const tData = data.teams[myTeam];
            
            const wrapper = document.getElementById('player-wrapper');
            const sprite = document.getElementById('player-sprite');
            
            if(wrapper && tData.charX !== undefined) {
                wrapper.style.transform = `translate(${tData.charX * 62}px, ${tData.charY * 62}px)`;
                sprite.style.transform = `rotate(${tData.charDir * 90}deg)`;
            }

            if(myRole === 'Guide' && tData.path) {
                document.querySelectorAll('.path-dot').forEach(e => e.remove());
                const pathArr = tData.path.split('|');
                pathArr.forEach(p => {
                    const [px, py] = p.split(',');
                    const cell = document.getElementById(`cell-${px}-${py}`);
                    if(cell) {
                        let dot = document.createElement('div');
                        dot.className = 'path-dot';
                        cell.appendChild(dot);
                    }
                });
            }
        }

        function updateTimer() {
            let elapsed = Math.floor((Date.now() - roundStartTime) / 1000);
            let m = String(Math.floor(elapsed / 60)).padStart(2, '0');
            let s = String(elapsed % 60).padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}:${s}`;
        }

        function moveChar(action) {
            if (myRole !== 'Explorer') return; // 탐험가만 조작 가능
            db.ref(`rooms/${currentRoom}/teams/${myTeam}`).once('value').then(snapshot => {
                let d = snapshot.val();
                let nx = d.charX, ny = d.charY, nd = d.charDir;

                if(action === 'left') nd = (nd + 3) % 4;
                if(action === 'right') nd = (nd + 1) % 4;
                if(action === 'forward' || action === 'backward') {
                    let step = action === 'forward' ? 1 : -1;
                    if(nd === 0) ny -= step; else if(nd === 1) nx += step; else if(nd === 2) ny += step; else if(nd === 3) nx -= step;
                }

                if(nx >= 0 && nx < 5 && ny >= 0 && ny < 5 && mapData[ny][nx] !== 3) {
                    let newPath = d.path + `|${nx},${ny}`;
                    db.ref(`rooms/${currentRoom}/teams/${myTeam}`).update({ charX: nx, charY: ny, charDir: nd, path: newPath });
                } else {
                    const sprite = document.getElementById('player-sprite');
                    sprite.style.filter = 'drop-shadow(0 0 10px red)';
                    setTimeout(() => sprite.style.filter = 'none', 300);
                }
            });
        }

        function checkWin() {
            if (myRole !== 'Explorer') return;
            db.ref(`rooms/${currentRoom}`).once('value').then(snapshot => {
                let d = snapshot.val();
                let tData = d.teams[myTeam];
                const targetObj = targets[d.round - 1];

                if(tData.charX === targetObj.x && tData.charY === targetObj.y) {
                    let finalTime = Math.floor((Date.now() - d.startTime) / 1000);
                    db.ref(`rooms/${currentRoom}/teams/${myTeam}`).update({ finished: true, time: finalTime }).then(() => {
                        checkAllTeamsFinished(currentRoom);
                    });
                } else {
                    alert("Wrong place! Talk to your guide!");
                }
            });
        }

        function checkAllTeamsFinished(roomId) {
            db.ref(`rooms/${roomId}`).once('value').then(snapshot => {
                let d = snapshot.val();
                let allFinished = true;
                
                ['A', 'B'].forEach(t => {
                    // 팀 데이터가 존재하고 한 번이라도 이동한 흔적이 있는 활성 팀만 체크
                    if(d.teams && d.teams[t] && d.teams[t].charX !== undefined) {
                        if(!d.teams[t].finished) allFinished = false;
                    }
                });

                if(allFinished) {
                    let nextStatus = d.round >= 4 ? 'game_over' : 'round_end';
                    db.ref(`rooms/${roomId}`).update({ status: nextStatus });
                }
            });
        }

        function showRoundEnd(data) {
            clearInterval(timerInterval);
            document.getElementById('modal').style.display = 'flex';
            
            let desc = "";
            if(data.teams && data.teams['A'] && data.teams['A'].time) {
                desc += `Team A Time: ${data.teams['A'].time} seconds<br>`;
            }
            if(data.teams && data.teams['B'] && data.teams['B'].time) {
                desc += `Team B Time: ${data.teams['B'].time} seconds<br>`;
            }

            if(data.status === 'game_over') {
                document.getElementById('modal-title').innerText = "All 4 Rounds Complete!";
                document.getElementById('modal-title').style.color = "#39ff14";
                document.getElementById('modal-desc').innerHTML = `<h3>Final Records</h3>${desc}`;
                document.getElementById('next-round-btn').style.display = 'none';
            } else {
                document.getElementById('modal-title').innerText = `Round ${data.round} Cleared!`;
                document.getElementById('modal-desc').innerHTML = desc + `<br><span style="font-size:0.9rem; color:yellow;">Roles will swap next round!</span>`;
                
                if(isHost) {
                    document.getElementById('next-round-btn').style.display = 'block';
                    document.getElementById('next-round-btn').onclick = () => startRound(data.round + 1);
                }
            }
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
    </script>
</body>
</html>
