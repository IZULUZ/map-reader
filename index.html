<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Map Reader</title>
    <!-- 폰트 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <!-- Firebase 버전 8 (초보자가 사용하기 가장 쉬운 호환 버전) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* 기본 팝&키치 스타일 */
        :root {
            --bg: #2d004b; --grid-road: #dcdcdc; --grid-grass: #c1f0c1;
            --btn-forward: #00f0ff; --btn-backward: #ffb3d9; --btn-right: #ffeb3b; --btn-left: #ff8c00;
        }
        body { margin: 0; font-family: 'Nunito', sans-serif; background-color: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; user-select: none; }
        h1 { font-family: 'Fredoka One', cursive; font-size: 3rem; color: #ff007f; text-shadow: 2px 2px white, 4px 4px #00f0ff; margin: 10px 0; }
        
        /* 화면 숨김 처리 */
        .screen { display: none; width: 100%; max-width: 1000px; height: 100%; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }

        /* 버튼 공통 스타일 */
        button { font-family: 'Fredoka One', cursive; font-size: 1.5rem; padding: 15px 30px; border: 4px solid black; border-radius: 15px; cursor: pointer; box-shadow: 4px 4px black; transition: transform 0.1s; }
        button:active { transform: translate(4px, 4px); box-shadow: none; }
        .btn-pink { background-color: #ff007f; color: white; }
        .btn-cyan { background-color: #00f0ff; color: black; }
        .btn-yellow { background-color: #ffeb3b; color: black; }

        /* 입력창 스타일 */
        input { font-family: 'Nunito', sans-serif; font-size: 1.5rem; padding: 10px; border: 4px solid black; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        
        /* 대기방 팀 드래그 존 */
        .team-container { display: flex; gap: 30px; width: 100%; justify-content: center; margin-top: 20px; }
        .team-box { width: 300px; min-height: 200px; border: 4px dashed white; border-radius: 20px; padding: 15px; background: rgba(255,255,255,0.1); }
        .team-title { font-family: 'Fredoka One'; font-size: 2rem; text-align: center; margin-bottom: 10px; }
        .player-card { background: white; color: black; border: 3px solid black; border-radius: 10px; padding: 10px; margin: 5px; font-weight: bold; cursor: grab; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .color-preview { width: 20px; height: 20px; border-radius: 50%; border: 2px solid black; display: inline-block; }

        /* 게임 화면 레이아웃 (태블릿용 좌우 분할) */
        .game-layout { display: flex; width: 100%; gap: 20px; justify-content: center; align-items: flex-start; margin-top: 10px; }
        .board-section { flex: 1; display: flex; flex-direction: column; align-items: center; background: #fff9e6; border: 4px solid black; border-radius: 20px; padding: 15px; }
        .grid-board { display: grid; grid-template-columns: repeat(5, 60px); grid-template-rows: repeat(5, 60px); gap: 2px; background: black; border: 4px solid black; }
        .cell { width: 60px; height: 60px; background-color: var(--grid-grass); display: flex; justify-content: center; align-items: center; font-size: 2rem; position: relative; }
        .road { background-color: var(--grid-road); }
        
        /* 캐릭터 */
        .character { width: 40px; height: 40px; border-radius: 50%; border: 3px solid black; position: absolute; transition: 0.3s; z-index: 10; display: flex; justify-content: center; align-items: center; font-weight: bold;}
        
        /* 컨트롤 패널 */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; width: 100%; }
        .controls button { padding: 15px; font-size: 1.2rem; }
        #dest-display { font-family: 'Fredoka One'; font-size: 2rem; color: #ff007f; margin-bottom: 10px; background: white; padding: 5px 15px; border-radius: 10px; border: 3px solid black; text-align: center;}
    </style>
</head>
<body>

    <h1>Map Reader</h1>

    <!-- 1. 인트로 화면 -->
    <div id="intro-screen" class="screen active">
        <h2 style="color:var(--btn-forward)">Enter Your Nickname</h2>
        <input type="text" id="nickname-input" placeholder="Nickname">
        <h3 style="color:var(--btn-right)">Customize Character</h3>
        <input type="color" id="color-input" value="#ff007f" style="width: 100px; height: 50px; cursor: pointer;">
        <button class="btn-pink" onclick="login()">ENTER GAME</button>
    </div>

    <!-- 2. 로비 화면 -->
    <div id="lobby-screen" class="screen">
        <h2>Welcome, <span id="display-name"></span>!</h2>
        <div style="display: flex; gap: 20px; margin-top: 30px;">
            <button class="btn-cyan" onclick="createRoom()">CREATE ROOM</button>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="room-code-input" placeholder="Room Code (4 digits)">
                <button class="btn-yellow" onclick="joinRoom()">JOIN ROOM</button>
            </div>
        </div>
    </div>

    <!-- 3. 대기방 화면 (팀 드래그) -->
    <div id="room-screen" class="screen">
        <h2>Room Code: <span id="room-code-display" style="color:#39ff14; font-size: 3rem;"></span></h2>
        <p>Drag your character to pick a team! (Need 4 players for team mode)</p>
        
        <div class="team-container">
            <div class="team-box" id="team-A" ondragover="allowDrop(event)" ondrop="drop(event, 'A')">
                <div class="team-title" style="color: #ff007f;">TEAM A</div>
                <!-- 드래그할 플레이어들이 여기에 생성됨 -->
            </div>
            <div class="team-box" id="team-B" ondragover="allowDrop(event)" ondrop="drop(event, 'B')">
                <div class="team-title" style="color: #00f0ff;">TEAM B</div>
            </div>
            <div class="team-box" id="team-none" ondragover="allowDrop(event)" ondrop="drop(event, 'none')">
                <div class="team-title" style="color: white;">Waiting...</div>
            </div>
        </div>

        <div style="margin-top: 30px; display: flex; gap: 20px;">
            <button class="btn-cyan" id="ready-btn" onclick="toggleReady()">READY</button>
            <button class="btn-pink" id="start-game-btn" onclick="startGame()" style="display: none;">START GAME</button>
        </div>
    </div>

    <!-- 4. 게임 화면 -->
    <div id="game-screen" class="screen">
        <h2 id="role-display" style="margin-top: 0;"></h2>
        <div class="game-layout">
            <!-- 게임 맵 영역 -->
            <div class="board-section" id="my-board-section">
                <div id="dest-display">Wait...</div>
                <div class="grid-board" id="grid"></div>
                <div class="controls" id="controls" style="display: none;">
                    <button style="background: var(--btn-forward)" onclick="moveChar('forward')">⬆️ Forward</button>
                    <button style="background: var(--btn-backward)" onclick="moveChar('backward')">⬇️ Backward</button>
                    <button style="background: var(--btn-left)" onclick="moveChar('left')">⬅️ Turn Left</button>
                    <button style="background: var(--btn-right)" onclick="moveChar('right')">➡️ Turn Right</button>
                </div>
                <button class="btn-pink" id="check-btn" onclick="checkWin()" style="width: 100%; margin-top: 15px; display: none;">CHECK DESTINATION</button>
            </div>
        </div>
    </div>

    <script>
        // ★ 여기에 파이어베이스 설정을 붙여넣으세요 (아래는 예시 구조입니다)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // Firebase 초기화
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 전역 변수
        let myId = "user_" + Math.floor(Math.random() * 10000);
        let myName = "Player";
        let myColor = "#ff007f";
        let currentRoom = "";
        let isHost = false;
        let myTeam = "none";
        let myRole = ""; // 'Guide' or 'Explorer'
        
        // 간단한 5x5 맵 데이터 (0: 빈길, 1: 잔디, 2: 목적지 건물, 3: 장애물)
        const mapData = [
            [2, 0, 1, 3, 2],
            [1, 0, 0, 0, 1],
            [2, 0, 1, 0, 2],
            [3, 0, 0, 0, 3],
            [1, 1, 2, 0, 1]
        ];

        // 1. 로그인
        function login() {
            const nameInput = document.getElementById('nickname-input').value;
            if(nameInput) myName = nameInput;
            myColor = document.getElementById('color-input').value;
            document.getElementById('display-name').innerText = myName;
            switchScreen('lobby-screen');
        }

        // 2. 방 만들기
        function createRoom() {
            currentRoom = Math.floor(1000 + Math.random() * 9000).toString(); // 4자리 번호
            isHost = true;
            
            db.ref('rooms/' + currentRoom).set({
                status: 'waiting',
                host: myId,
                round: 1
            });
            joinDbRoom();
            switchScreen('room-screen');
            document.getElementById('room-code-display').innerText = currentRoom;
            document.getElementById('start-game-btn').style.display = 'block'; // 방장만 보임
        }

        // 3. 방 접속하기
        function joinRoom() {
            const code = document.getElementById('room-code-input').value;
            if(code.length !== 4) return alert("Enter 4 digits!");
            currentRoom = code;
            joinDbRoom();
            switchScreen('room-screen');
            document.getElementById('room-code-display').innerText = currentRoom;
        }

        // DB에 플레이어 정보 등록 및 실시간 감지
        function joinDbRoom() {
            const playerRef = db.ref(`rooms/${currentRoom}/players/${myId}`);
            playerRef.set({ name: myName, color: myColor, team: 'none', ready: false });

            // 방 전체 데이터 실시간 감지
            db.ref(`rooms/${currentRoom}`).on('value', (snapshot) => {
                const data = snapshot.val();
                if(!data) return;

                // 대기방 UI 업데이트 (드래그 앤 드롭 캐릭터들)
                if(data.status === 'waiting') {
                    renderWaitingRoom(data.players);
                } 
                // 게임 시작 감지
                else if(data.status === 'playing') {
                    if(document.getElementById('game-screen').classList.contains('active') === false){
                        switchScreen('game-screen');
                        startGameLogic(data);
                    }
                    updateGameScreen(data); // 실시간 이동 업데이트
                }
            });
        }

        // 대기방 렌더링 (드래그 박스)
        function renderWaitingRoom(players) {
            document.getElementById('team-A').innerHTML = '<div class="team-title" style="color: #ff007f;">TEAM A</div>';
            document.getElementById('team-B').innerHTML = '<div class="team-title" style="color: #00f0ff;">TEAM B</div>';
            document.getElementById('team-none').innerHTML = '<div class="team-title" style="color: white;">Waiting...</div>';

            for(let id in players) {
                const p = players[id];
                const div = document.createElement('div');
                div.className = 'player-card';
                div.draggable = (id === myId); // 내 캐릭터만 드래그 가능
                div.id = id;
                div.ondragstart = drag;
                div.innerHTML = `<div class="color-preview" style="background:${p.color}"></div> ${p.name} ${p.ready ? '✅' : ''}`;
                
                document.getElementById('team-' + p.team).appendChild(div);
            }
        }

        // 드래그 앤 드롭 함수들
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function allowDrop(ev) { ev.preventDefault(); }
        function drop(ev, teamName) {
            ev.preventDefault();
            myTeam = teamName;
            db.ref(`rooms/${currentRoom}/players/${myId}`).update({ team: teamName });
        }

        function toggleReady() {
            const ref = db.ref(`rooms/${currentRoom}/players/${myId}`);
            ref.once('value').then(s => {
                ref.update({ ready: !s.val().ready });
            });
        }

        // 게임 시작 (방장 전용)
        function startGame() {
            // 편의를 위해 자동으로 역할 배정 로직 (실제로는 팀별 분리 필요)
            db.ref(`rooms/${currentRoom}`).update({
                status: 'playing',
                charX: 1, charY: 1, charDir: 0 // 캐릭터 초기 위치
            });
        }

        // 게임 로직 (역할에 따른 UI 구성)
        function startGameLogic(data) {
            // 임시로 방장을 Guide, 나머지를 Explorer로 지정
            myRole = isHost ? 'Guide' : 'Explorer';
            document.getElementById('role-display').innerText = `You are the ${myRole}!`;

            const grid = document.getElementById('grid');
            grid.innerHTML = ''; // 초기화

            if(myRole === 'Guide') {
                document.getElementById('dest-display').innerText = "Guide them to the HOSPITAL!";
                // 지도를 가진 유저는 모든 맵을 봅니다
                for(let y=0; y<5; y++) {
                    for(let x=0; x<5; x++) {
                        let cell = document.createElement('div');
                        cell.className = 'cell';
                        if(mapData[y][x] === 0) cell.classList.add('road');
                        if(mapData[y][x] === 2) cell.innerText = '🏥'; // 건물
                        if(mapData[y][x] === 3) cell.innerText = '🪨'; // 장애물
                        cell.id = `cell-${x}-${y}`;
                        grid.appendChild(cell);
                    }
                }
            } else {
                document.getElementById('dest-display').innerText = "DESTINATION: HOSPITAL";
                document.getElementById('controls').style.display = 'grid';
                document.getElementById('check-btn').style.display = 'block';
                // 탐험가는 텅 빈 격자만 봅니다
                for(let i=0; i<25; i++) {
                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.style.background = 'white';
                    grid.appendChild(cell);
                }
            }

            // 캐릭터 엘리먼트 생성
            const char = document.createElement('div');
            char.id = 'player-char';
            char.className = 'character';
            char.style.background = myColor;
            char.innerText = '👀';
            grid.appendChild(char);
        }

        // 실시간 캐릭터 이동 렌더링
        function updateGameScreen(data) {
            const char = document.getElementById('player-char');
            if(char && data.charX !== undefined) {
                // 한 칸이 60px + gap 2px = 62px 이동
                char.style.transform = `translate(${data.charX * 62}px, ${data.charY * 62}px) rotate(${data.charDir * 90}deg)`;
            }
        }

        // 탐험가의 이동 컨트롤 버튼 (클릭 시 DB만 업데이트하면 화면은 알아서 바뀜)
        function moveChar(action) {
            db.ref(`rooms/${currentRoom}`).once('value').then(snapshot => {
                let d = snapshot.val();
                let nx = d.charX, ny = d.charY, nd = d.charDir;

                if(action === 'left') nd = (nd + 3) % 4;
                if(action === 'right') nd = (nd + 1) % 4;
                if(action === 'forward' || action === 'backward') {
                    let step = action === 'forward' ? 1 : -1;
                    if(nd === 0) ny -= step; // Up
                    else if(nd === 1) nx += step; // Right
                    else if(nd === 2) ny += step; // Down
                    else if(nd === 3) nx -= step; // Left
                }

                // 맵 밖으로 나가거나 장애물 체크
                if(nx >= 0 && nx < 5 && ny >= 0 && ny < 5 && mapData[ny][nx] !== 3) {
                    db.ref(`rooms/${currentRoom}`).update({ charX: nx, charY: ny, charDir: nd });
                } else {
                    // 에러 피드백
                    document.getElementById('player-char').style.border = '3px solid red';
                    setTimeout(() => document.getElementById('player-char').style.border = '3px solid black', 300);
                }
            });
        }

        function checkWin() {
            db.ref(`rooms/${currentRoom}`).once('value').then(snapshot => {
                let d = snapshot.val();
                // 도착지점이 (0,0)에 있는 병원이라고 가정
                if(d.charX === 0 && d.charY === 0) {
                    alert("Perfect! Mission Complete!");
                } else {
                    alert("Wrong place! Talk to your guide!");
                }
            });
        }

        // 화면 전환 유틸리티
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
    </script>
</body>
</html>
