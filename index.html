<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Map Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg: #2d004b; --grid-road: #dcdcdc; --grid-grass: #c1f0c1;
            --btn-forward: #00f0ff; --btn-backward: #ffb3d9; --btn-right: #ffeb3b; --btn-left: #ff8c00;
        }
        body { margin: 0; font-family: 'Nunito', sans-serif; background-color: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; user-select: none; }
        h1 { font-family: 'Fredoka One', cursive; font-size: 3rem; color: #ff007f; text-shadow: 2px 2px white, 4px 4px #00f0ff; margin: 10px 0; }
        
        .screen { display: none; width: 100%; max-width: 1000px; height: 100%; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }

        button { font-family: 'Fredoka One', cursive; font-size: 1.5rem; padding: 15px 30px; border: 4px solid black; border-radius: 15px; cursor: pointer; box-shadow: 4px 4px black; transition: transform 0.1s; }
        button:active { transform: translate(4px, 4px); box-shadow: none; }
        .btn-pink { background-color: #ff007f; color: white; }
        .btn-cyan { background-color: #00f0ff; color: black; }
        .btn-yellow { background-color: #ffeb3b; color: black; }

        input { font-family: 'Nunito', sans-serif; font-size: 1.5rem; padding: 10px; border: 4px solid black; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        
        /* 캐릭터 선택 UI */
        .char-selection-container { display: flex; gap: 15px; margin-bottom: 30px; }
        .char-option { width: 80px; height: 80px; border: 4px solid white; border-radius: 15px; background-color: rgba(255,255,255,0.2); cursor: pointer; overflow: hidden; display: flex; justify-content: center; align-items: center; position: relative; }
        .char-option.selected { border-color: #39ff14; background-color: rgba(57,255,20,0.3); box-shadow: 0 0 15px #39ff14; }
        .char-option img { width: 100%; height: 100%; object-fit: contain; }
        /* 이미지가 없을 때를 대비한 기본 이모티콘 텍스트 */
        .char-option::before { content: '👤'; font-size: 2rem; position: absolute; z-index: -1; }

        /* 대기방 스타일 */
        .team-container { display: flex; gap: 30px; width: 100%; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .team-box { width: 300px; min-height: 200px; border: 4px dashed white; border-radius: 20px; padding: 15px; background: rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .team-title { font-family: 'Fredoka One'; font-size: 2rem; text-align: center; margin-bottom: 10px; }
        
        /* 대기방 유저 카드 */
        .player-card { background: white; color: black; border: 3px solid black; border-radius: 10px; padding: 10px; width: 80%; cursor: grab; display: flex; align-items: center; gap: 15px; font-weight: 900; }
        .player-card img { width: 40px; height: 40px; object-fit: contain; background: #eee; border-radius: 5px; }

        /* 게임 보드 및 맵 */
        .game-layout { display: flex; width: 100%; gap: 20px; justify-content: center; align-items: flex-start; margin-top: 10px; }
        .board-section { flex: 1; display: flex; flex-direction: column; align-items: center; background: #fff9e6; border: 4px solid black; border-radius: 20px; padding: 15px; }
        .grid-board { display: grid; grid-template-columns: repeat(5, 70px); grid-template-rows: repeat(5, 70px); gap: 2px; background: black; border: 4px solid black; position: relative; }
        .cell { width: 70px; height: 70px; background-color: var(--grid-grass); display: flex; justify-content: center; align-items: center; font-size: 2rem; position: relative; }
        
        /* 배경 이미지 적용 (추후 업로드 시 자동 적용) */
        .road { background-color: var(--grid-road); background-image: url('road.png'); background-size: cover; }
        .hospital-cell { background-image: url('hospital.png'); background-size: cover; }
        .obstacle-cell { background-image: url('obstacle.png'); background-size: cover; }
        
        /* 맵 위의 캐릭터 및 닉네임 컨테이너 */
        .char-wrapper { position: absolute; width: 70px; height: 70px; z-index: 10; transition: transform 0.4s ease-in-out; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        .char-sprite { width: 50px; height: 50px; object-fit: contain; transition: transform 0.3s; }
        .char-name-tag { position: absolute; bottom: -15px; background: rgba(0,0,0,0.7); color: white; padding: 2px 6px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; white-space: nowrap; }
        
        /* 컨트롤 패널 */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; width: 100%; max-width: 400px;}
        .controls button { padding: 15px; font-size: 1.2rem; }
        #dest-display { font-family: 'Fredoka One'; font-size: 2rem; color: #ff007f; margin-bottom: 10px; background: white; padding: 5px 15px; border-radius: 10px; border: 3px solid black; text-align: center;}
    </style>
</head>
<body>

    <h1>Map Reader</h1>

    <!-- 1. 인트로 화면 -->
    <div id="intro-screen" class="screen active">
        <h2 style="color:var(--btn-forward)">Enter Your Nickname</h2>
        <input type="text" id="nickname-input" placeholder="Your Name" maxlength="10">
        
        <h3 style="color:var(--btn-right)">Select Your Character</h3>
        <div class="char-selection-container">
            <div class="char-option selected" onclick="selectChar('char1.png', this)">
                <img src="char1.png" onerror="this.style.display='none'">
            </div>
            <div class="char-option" onclick="selectChar('char2.png', this)">
                <img src="char2.png" onerror="this.style.display='none'">
            </div>
            <div class="char-option" onclick="selectChar('char3.png', this)">
                <img src="char3.png" onerror="this.style.display='none'">
            </div>
            <div class="char-option" onclick="selectChar('char4.png', this)">
                <img src="char4.png" onerror="this.style.display='none'">
            </div>
            <div class="char-option" onclick="selectChar('char5.png', this)">
                <img src="char5.png" onerror="this.style.display='none'">
            </div>
        </div>

        <button class="btn-pink" onclick="login()">ENTER GAME</button>
    </div>

    <!-- 2. 로비 화면 -->
    <div id="lobby-screen" class="screen">
        <h2>Welcome, <span id="display-name" style="color: yellow;"></span>!</h2>
        <div style="display: flex; gap: 20px; margin-top: 30px; align-items: center;">
            <button class="btn-cyan" onclick="createRoom()">CREATE ROOM</button>
            <h3 style="margin: 0 20px;">OR</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="room-code-input" placeholder="Enter 4 Digits" maxlength="4">
                <button class="btn-yellow" onclick="joinRoom()">JOIN ROOM</button>
            </div>
        </div>
    </div>

    <!-- 3. 대기방 화면 -->
    <div id="room-screen" class="screen">
        <h2>Room Code: <span id="room-code-display" style="color:#39ff14; font-size: 3rem;"></span></h2>
        <p>Drag your character card to pick a team!</p>
        
        <div class="team-container">
            <div class="team-box" id="team-A" ondragover="allowDrop(event)" ondrop="drop(event, 'A')">
                <div class="team-title" style="color: #ff007f;">TEAM A</div>
            </div>
            <div class="team-box" id="team-B" ondragover="allowDrop(event)" ondrop="drop(event, 'B')">
                <div class="team-title" style="color: #00f0ff;">TEAM B</div>
            </div>
            <div class="team-box" id="team-none" ondragover="allowDrop(event)" ondrop="drop(event, 'none')">
                <div class="team-title" style="color: white;">Waiting Area</div>
            </div>
        </div>

        <div style="margin-top: 30px; display: flex; gap: 20px;">
            <button class="btn-cyan" id="ready-btn" onclick="toggleReady()">READY</button>
            <button class="btn-pink" id="start-game-btn" onclick="startGame()" style="display: none;">START GAME</button>
        </div>
    </div>

    <!-- 4. 게임 화면 -->
    <div id="game-screen" class="screen">
        <h2 id="role-display" style="margin-top: 0; color: yellow;"></h2>
        <div class="game-layout">
            <div class="board-section" id="my-board-section">
                <div id="dest-display">Wait...</div>
                
                <!-- 맵이 그려질 공간 -->
                <div class="grid-board" id="grid">
                    <!-- 캐릭터 컨테이너 -->
                    <div class="char-wrapper" id="player-wrapper">
                        <img id="player-sprite" class="char-sprite" src="char1.png" onerror="this.style.display='none'">
                        <div class="char-name-tag" id="player-name-tag">Player</div>
                    </div>
                </div>

                <div class="controls" id="controls" style="display: none;">
                    <button style="background: var(--btn-forward)" onclick="moveChar('forward')">⬆️ Forward</button>
                    <button style="background: var(--btn-backward)" onclick="moveChar('backward')">⬇️ Backward</button>
                    <button style="background: var(--btn-left)" onclick="moveChar('left')">⬅️ Turn Left</button>
                    <button style="background: var(--btn-right)" onclick="moveChar('right')">➡️ Turn Right</button>
                </div>
                <button class="btn-pink" id="check-btn" onclick="checkWin()" style="width: 100%; margin-top: 15px; display: none;">CHECK DESTINATION</button>
            </div>
        </div>
    </div>

    <script>
        // 파이어베이스 설정 (작동 안 되던 버그 수정 완료: databaseURL 추가)
        const firebaseConfig = {
            apiKey: "AIzaSyB3_wuWX1_d3SQJyISYENg_Slo0xU4MDI4",
            authDomain: "mapreader-a1faa.firebaseapp.com",
            databaseURL: "https://mapreader-a1faa-default-rtdb.firebaseio.com", 
            projectId: "mapreader-a1faa",
            storageBucket: "mapreader-a1faa.firebasestorage.app",
            messagingSenderId: "1056558168005",
            appId: "1:1056558168005:web:016434cbb166c5b338bdac",
            measurementId: "G-9463ZL4HXH"
        };
        
        // 파이어베이스 초기화
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 전역 변수
        let myId = "user_" + Math.floor(Math.random() * 10000);
        let myName = "";
        let myChar = "char1.png"; // 기본 선택 캐릭터
        let currentRoom = "";
        let isHost = false;
        let myTeam = "none";
        let myRole = "";
        
        // 맵 데이터 (0: 도로, 1: 잔디, 2: 병원(도착지), 3: 방해물)
        const mapData = [
            [2, 0, 1, 3, 1],
            [1, 0, 0, 0, 1],
            [1, 0, 1, 0, 1],
            [3, 0, 0, 0, 3],
            [1, 1, 1, 0, 1]
        ];

        // 캐릭터 선택 함수
        function selectChar(imgName, element) {
            myChar = imgName;
            document.querySelectorAll('.char-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
        }

        // 로그인
        function login() {
            const nameInput = document.getElementById('nickname-input').value.trim();
            if(!nameInput) {
                alert("Please enter a nickname!");
                return;
            }
            myName = nameInput;
            document.getElementById('display-name').innerText = myName;
            switchScreen('lobby-screen');
        }

        // 방 생성
        function createRoom() {
            currentRoom = Math.floor(1000 + Math.random() * 9000).toString();
            isHost = true;
            
            db.ref('rooms/' + currentRoom).set({
                status: 'waiting',
                host: myId,
                round: 1
            }).then(() => {
                joinDbRoom();
                switchScreen('room-screen');
                document.getElementById('room-code-display').innerText = currentRoom;
                document.getElementById('start-game-btn').style.display = 'block';
            }).catch(err => alert("Database Error: " + err.message));
        }

        // 방 입장
        function joinRoom() {
            const code = document.getElementById('room-code-input').value.trim();
            if(code.length !== 4) return alert("Enter 4 digits!");
            currentRoom = code;
            joinDbRoom();
            switchScreen('room-screen');
            document.getElementById('room-code-display').innerText = currentRoom;
        }

        // DB 실시간 동기화
        function joinDbRoom() {
            const playerRef = db.ref(`rooms/${currentRoom}/players/${myId}`);
            playerRef.set({ name: myName, charImg: myChar, team: 'none', ready: false });

            db.ref(`rooms/${currentRoom}`).on('value', (snapshot) => {
                const data = snapshot.val();
                if(!data) return;

                if(data.status === 'waiting') {
                    renderWaitingRoom(data.players);
                } else if(data.status === 'playing') {
                    if(!document.getElementById('game-screen').classList.contains('active')){
                        switchScreen('game-screen');
                        startGameLogic(data);
                    }
                    updateGameScreen(data);
                }
            });
        }

        // 대기방 UI (캐릭터 이미지와 닉네임 표시)
        function renderWaitingRoom(players) {
            document.getElementById('team-A').innerHTML = '<div class="team-title" style="color: #ff007f;">TEAM A</div>';
            document.getElementById('team-B').innerHTML = '<div class="team-title" style="color: #00f0ff;">TEAM B</div>';
            document.getElementById('team-none').innerHTML = '<div class="team-title" style="color: white;">Waiting Area</div>';

            for(let id in players) {
                const p = players[id];
                const div = document.createElement('div');
                div.className = 'player-card';
                div.draggable = (id === myId); 
                div.id = id;
                div.ondragstart = drag;
                div.innerHTML = `
                    <img src="${p.charImg}" onerror="this.style.display='none'">
                    <span>${p.name} ${p.ready ? '✅' : ''}</span>
                `;
                document.getElementById('team-' + p.team).appendChild(div);
            }
        }

        // 드래그 앤 드롭
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function allowDrop(ev) { ev.preventDefault(); }
        function drop(ev, teamName) {
            ev.preventDefault();
            myTeam = teamName;
            db.ref(`rooms/${currentRoom}/players/${myId}`).update({ team: teamName });
        }

        function toggleReady() {
            const ref = db.ref(`rooms/${currentRoom}/players/${myId}`);
            ref.once('value').then(s => {
                ref.update({ ready: !s.val().ready });
            });
        }

        // 방장 전용 게임 시작 (탐험가는 시작 좌표 3, 4)
        function startGame() {
            db.ref(`rooms/${currentRoom}`).update({
                status: 'playing',
                charX: 3, charY: 4, charDir: 0 
            });
        }

        // 게임 화면 초기화
        function startGameLogic(data) {
            myRole = isHost ? 'Guide' : 'Explorer';
            document.getElementById('role-display').innerText = isHost ? "You are the Guide! (지도를 보고 설명하세요)" : "You are the Explorer! (지시를 듣고 조종하세요)";

            const grid = document.getElementById('grid');
            // 캐릭터 래퍼를 제외한 셀 초기화
            document.querySelectorAll('.cell').forEach(e => e.remove());

            if(myRole === 'Guide') {
                document.getElementById('dest-display').innerText = "Guide them to the HOSPITAL!";
                for(let y=0; y<5; y++) {
                    for(let x=0; x<5; x++) {
                        let cell = document.createElement('div');
                        cell.className = 'cell';
                        if(mapData[y][x] === 0) cell.classList.add('road');
                        if(mapData[y][x] === 2) { cell.innerText = '🏥'; cell.classList.add('hospital-cell'); }
                        if(mapData[y][x] === 3) { cell.innerText = '🪨'; cell.classList.add('obstacle-cell'); }
                        grid.appendChild(cell);
                    }
                }
            } else {
                document.getElementById('dest-display').innerText = "DESTINATION: HOSPITAL";
                document.getElementById('controls').style.display = 'grid';
                document.getElementById('check-btn').style.display = 'block';
                for(let i=0; i<25; i++) {
                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.style.background = 'white';
                    grid.appendChild(cell);
                }
            }

            // 캐릭터 이름 및 이미지 세팅 (탐험가의 정보 가져오기)
            let explorerName = "Player";
            let explorerImg = "char1.png";
            for(let id in data.players) {
                if(id !== data.host) { // 방장이 아닌 사람이 탐험가
                    explorerName = data.players[id].name;
                    explorerImg = data.players[id].charImg;
                }
            }
            document.getElementById('player-sprite').src = explorerImg;
            document.getElementById('player-name-tag').innerText = explorerName;
        }

        // 캐릭터 실시간 위치 및 회전 업데이트
        function updateGameScreen(data) {
            const wrapper = document.getElementById('player-wrapper');
            const sprite = document.getElementById('player-sprite');
            
            if(wrapper && data.charX !== undefined) {
                // X, Y 이동 (셀 크기 70px + 간격 2px = 72px)
                wrapper.style.transform = `translate(${data.charX * 72}px, ${data.charY * 72}px)`;
                // 스프라이트만 회전 (이름표는 정방향 유지)
                sprite.style.transform = `rotate(${data.charDir * 90}deg)`;
            }
        }

        // 탐험가 이동 컨트롤
        function moveChar(action) {
            db.ref(`rooms/${currentRoom}`).once('value').then(snapshot => {
                let d = snapshot.val();
                let nx = d.charX, ny = d.charY, nd = d.charDir;

                if(action === 'left') nd = (nd + 3) % 4;
                if(action === 'right') nd = (nd + 1) % 4;
                if(action === 'forward' || action === 'backward') {
                    let step = action === 'forward' ? 1 : -1;
                    if(nd === 0) ny -= step; // 위
                    else if(nd === 1) nx += step; // 오른쪽
                    else if(nd === 2) ny += step; // 아래
                    else if(nd === 3) nx -= step; // 왼쪽
                }

                if(nx >= 0 && nx < 5 && ny >= 0 && ny < 5 && mapData[ny][nx] !== 3) {
                    db.ref(`rooms/${currentRoom}`).update({ charX: nx, charY: ny, charDir: nd });
                } else {
                    const sprite = document.getElementById('player-sprite');
                    sprite.style.filter = 'drop-shadow(0 0 10px red)';
                    setTimeout(() => sprite.style.filter = 'none', 300);
                }
            });
        }

        // 목적지 도착 확인
        function checkWin() {
            db.ref(`rooms/${currentRoom}`).once('value').then(snapshot => {
                let d = snapshot.val();
                if(d.charX === 0 && d.charY === 0) { // 맵 상 병원 좌표 (0,0)
                    alert("Perfect! Mission Complete!");
                } else {
                    alert("Wrong place! Talk to your guide!");
                }
            });
        }

        // 화면 전환 유틸
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
    </script>
</body>
</html>
